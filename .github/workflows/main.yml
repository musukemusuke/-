name: Run Discord Bot

on:
  push:
    branches: [ main ]
  schedule:
    # 3時間ごとに自動起動してバトンを繋ぐ（6時間制限の対策）
    - cron: '0 */3 * * *'
  workflow_dispatch: # 手動で起動できるボタンを追加

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
    # ★Node 24環境に完全ネイティブ対応した、正真正銘の最新メジャーバージョン「@v5」を指定
    - name: Checkout code safely
      uses: actions/checkout@v5

    # ★Node 24環境に完全ネイティブ対応した、公式Python部品の最新メジャーバージョン「@v6」を指定
    - name: Set up Python safely
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
    
    # 日本語PDF生成に必要なフォントをインストール（プロジェクト固有の依存関係）
    - name: Install system dependencies (Japanese fonts)
      run: |
        sudo apt-get update
        sudo apt-get install -y fonts-ipafont fonts-ipaexfont

    # ボットに必要な全てのPythonパッケージをインストール
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt --upgrade

    # Botを起動（環境変数名をプロジェクト仕様に統一）
    - name: Start Bot
      env:
        DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
      run: |
        cd $GITHUB_WORKSPACE
        ls -la # ディレクトリ内容を確認（デバッグ用）
        PYTHONPATH=. python -u bot.py
